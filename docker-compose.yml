version: '3.8'
services:
 db:
 image: postgres:16
 environment:
 POSTGRES_DB: setu
 POSTGRES_USER: setu_user
 POSTGRES_PASSWORD: setu_dev_password
 ports:
 - '5432:5432'
 volumes:
 - postgres_data:/var/lib/postgresql/data
 backend:
 build: ./backend
 ports:
 - '3001:3001'
 env_file:
 - ./backend/.env
 depends_on:
 - db
 volumes:
 - ./backend:/app
 - /app/node_modules
 frontend:
 build: ./frontend
 ports:
 - '3000:3000'
 volumes:
 - ./frontend:/app
 - /app/node_modules
volumes:
 postgres_data:
